<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Links da Loja</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 420px;
    }

    h1 {
      margin-bottom: 30px;
      font-size: clamp(20px, 5vw, 26px);
      letter-spacing: 2px;
    }

    .link {
      display: block;
      margin: 12px 0;
      padding: 14px;
      border: 2px solid #fff;
      border-radius: 12px;
      text-decoration: none;
      color: #fff;
      font-weight: bold;
      font-size: clamp(14px, 4vw, 16px);
      transition: 0.3s;
    }

    .link:hover {
      background-color: #fff;
      color: #000;
    }

    /* Ajustes extras para telas muito pequenas */
    @media (max-width: 350px) {
      .link {
        padding: 12px;
      }
    }

  </style>
</head>
<body>

  <div class="container">
    <h1>VICTOR SECRET</h1>

    <a href="https://victorsecretstyle.com.br/" class="link" target="_blank">
      🛒 Ir para o Site
    </a>

    <a href="https://wa.me/5521966933639" class="link" target="_blank">
      💬 Falar no WhatsApp
    </a>

    <a href="https://chat.whatsapp.com/seulinkdogrupo" class="link" target="_blank">
      🔥 Entrar no Grupo VIP
    </a>

  </div>

</body>
</html>
