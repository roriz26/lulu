<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Para você 💖</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Open Sans', Arial, sans-serif;
     background-color: aliceblue;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      backdrop-filter: brightness(0.9);
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      color: #8a2be2;
      font-size: 60px;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    p {
      font-size: 22px;
      color: #444;
      font-weight: bold;
      margin-bottom: 30px;
    }

    img {
      width: 250px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      margin-bottom: 30px;
      transition: transform 0.3s ease;
    }

    img:hover {
      transform: scale(1.05);
    }

    .botoes {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    button {
      width: 100px;
      height: 45px;
      font-weight: bold;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .sim {
      background-color: #e75480;
      color: white;
    }

    .sim:hover {
      background-color: #ff8da6;
      transform: scale(1.1);
    }

    .nao {
      background-color: #555;
      color: white;
    }

    .nao:hover {
      background-color: #999;
      transform: scale(1.1);
    }


.besta {

  width: 300px;
  border-radius: 20px;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
  display: block;
  margin: 20px auto; /* centraliza horizontalmente */
  transition: transform 0.3s ease;
}

.besta:hover {
  transform: scale(1.05); /* zoom ao passar o mouse */
}



  </style>
</head>
<body>

  <h1>  Quer namorar comigo?💕</h1>
 
  <p> Prfvr Namora Comingu</p>

 
  

  <div class="botoes">

  <a href="pag002.html"> <button class="sim">Sim </button>  </a> 

   <a href="pag003.html"><button class="nao">Não </button> </a>
  </div>
</body>
</html>
